<svg xmlns="http://www.w3.org/2000/svg" width="32" height="16" viewBox="0 0 32 16" fill="none">
  <!-- Two-layer alternating battenburg: each column flips colours top-to-bottom -->
  <rect x="0"  y="0" width="16" height="8" fill="#00843D"/>
  <rect x="16" y="0" width="16" height="8" fill="#FFD200"/>
  <rect x="0"  y="8" width="16" height="8" fill="#FFD200"/>
  <rect x="16" y="8" width="16" height="8" fill="#00843D"/>
</svg>
